<header class="navbar" [class.scrolled]="scrolled">
  <div class="container navbar-inner">

    <a routerLink="/" class="navbar-logo" (click)="closeMenu()">
      <div class="logo-text">
        <span class="logo-name">IDSM</span>
        <span class="logo-sub">Bureau d'études techniques</span>
      </div>
    </a>

    <!-- Desktop nav -->
    <nav class="desktop-nav">
      <ul class="nav-links">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Accueil</a></li>
        <li><a routerLink="/a-propos" routerLinkActive="active">A propos</a></li>
        <li><a routerLink="/missions" routerLinkActive="active">Missions</a></li>
        <li><a routerLink="/domaines" routerLinkActive="active">Domaines d'intervention</a></li>
        <li><a routerLink="/contact" routerLinkActive="active">Contact</a></li>
      </ul>
    </nav>

    <!-- Desktop CTA -->
    <a href="http://wa.me/212661403238" class="btn-whatsapp desktop-cta" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg">
        <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157z"/>
      </svg>
      Discutons
    </a>

    <!-- Burger button (mobile only) -->
    <button class="burger" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- Mobile menu -->
  <div class="mobile-menu" [class.open]="menuOpen">
    <ul>
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Accueil</a></li>
      <li><a routerLink="/a-propos" routerLinkActive="active" (click)="closeMenu()">A propos</a></li>
      <li><a routerLink="/missions" routerLinkActive="active" (click)="closeMenu()">Missions</a></li>
      <li><a routerLink="/domaines" routerLinkActive="active" (click)="closeMenu()">Domaines d'intervention</a></li>
      <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
    </ul>
    <a href="http://wa.me/212661403238" class="btn-whatsapp mobile-cta" target="_blank" rel="noopener noreferrer" (click)="closeMenu()">
      <svg viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg">
        <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157z"/>
      </svg>
      Discutons
    </a>
  </div>

</header>

<!-- Overlay -->
<div class="menu-overlay" [class.open]="menuOpen" (click)="closeMenu()"></div>
